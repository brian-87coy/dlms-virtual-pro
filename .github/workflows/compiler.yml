name: Build DLMS APK Matrix and RTA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Gunakan Java modern
    - name: Install Java (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 2. Ambil Flutter stable versi paling baru
    - name: Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 3. Buat folder baru murni dari Flutter SDK
    - name: Generate Fresh Flutter Project V2
      run: |
        cd $HOME
        flutter create --template=app --platforms=android --org com.example dlms_virtual
        cd dlms_virtual
        mkdir -p android/app/src/main/kotlin/com/example/dlms_virtual

    # 4. Suntik Kode UI Dart Lengkap (GEQ, PEQ, X-Over, Limiter, Matrix, RTA)
    - name: Suntik Kode UI dan Fitur Baru
      run: |
        cd $HOME/dlms_virtual
        
        cat << 'EOF' > lib/dlms_controller.dart
        import 'package:flutter/services.dart';

        class DlmsController {
          static const _channel = MethodChannel('com.example.dlms/audiofx');
          static const eventChannel = EventChannel('com.example.dlms/rta_stream');

          static Future<void> setGeq(int bandIndex, double gain) async {
            try { await _channel.invokeMethod('setGeq', {'band': bandIndex, 'gain': gain}); } catch (e) { print(e); }
          }

          static Future<void> setPeq(int ch, int band, double freq, double gain) async {
            try { await _channel.invokeMethod('setPeq', {'channel': ch, 'band': band, 'freq': freq, 'gain': gain}); } catch (e) { print(e); }
          }

          static Future<void> setCrossover(int ch, int band, double cutoff) async {
            try { await _channel.invokeMethod('setCrossover', {'channel': ch, 'band': band, 'cutoff': cutoff}); } catch (e) { print(e); }
          }

          static Future<void> setLimiter(int ch, bool enabled, double thresh) async {
            try { await _channel.invokeMethod('setLimiter', {'channel': ch, 'enabled': enabled, 'thresh': thresh}); } catch (e) { print(e); }
          }

          static Future<void> setMatrix(int inputCh, int outputCh, double gain) async {
            try { await _channel.invokeMethod('setMatrix', {'input': inputCh, 'output': outputCh, 'gain': gain}); } catch (e) { print(e); }
          }
        }
        EOF

        cat << 'EOF' > lib/main.dart
        import 'dart:math';
        import 'package:flutter/material.dart';
        import 'dlms_controller.dart';

        void main() => runApp(MaterialApp(home: DlmsHomeScreen(), theme: ThemeData.dark(), debugShowCheckedModeBanner: false));

        class DlmsHomeScreen extends StatefulWidget {
          @override
          _DlmsHomeScreenState createState() => _DlmsHomeScreenState();
        }

        class _DlmsHomeScreenState extends State<DlmsHomeScreen> {
          int activeChannel = 0; 
          List<double> geqGains = List.filled(10, 0.0);
          List<int> geqFreqs = [31, 62, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

          double peqFreq = 1000.0;
          double peqGain = 0.0;
          double xOverFreq = 120.0;
          double limiterThresh = -1.0;

          // Data Matrix Mixer: [Input IN1/IN2][Output CH1/CH2]
          List<List<double>> matrixGains = [
            [1.0, 0.0], // IN 1 ke CH 1 (Left), IN 1 ke CH 2 (Right)
            [0.0, 1.0], // IN 2 ke CH 1 (Left), IN 2 ke CH 2 (Right)
          ];

          List<double> rtaData = List.filled(16, 0.0);

          @override
          void initState() {
            super.initState();
            // Dengarkan data spektrum RTA dari Audio HAL Android
            DlmsController.eventChannel.receiveBroadcastStream().listen((event) {
              if (event is List) {
                setState(() {
                  rtaData = event.map<double>((e) => (e as num).toDouble()).toList();
                });
              }
            });
          }

          @override
          Widget build(BuildContext context) {
            return DefaultTabController(
              length: 5,
              child: Scaffold(
                appBar: AppBar(
                  title: Text('🔴 DLMS VIRTUAL PRO + RTA'),
                  bottom: TabBar(
                    isScrollable: true,
                    tabs: [
                      Tab(icon: Icon(Icons.grid_on), text: "Matrix Input"),
                      Tab(icon: Icon(Icons.equalizer), text: "Master GEQ"),
                      Tab(icon: Icon(Icons.tune), text: "Parametric EQ"),
                      Tab(icon: Icon(Icons.call_split), text: "Crossover"),
                      Tab(icon: Icon(Icons.gpp_good), text: "Limiter"),
                    ],
                  ),
                ),
                body: Column(
                  children: [
                    // Komponen RTA Real-time per Channel
                    _buildRtaDisplay(),
                    Container(
                      color: Colors.black26,
                      padding: EdgeInsets.symmetric(vertical: 8),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          ChoiceChip(
                            label: Text('🔊 OUTPUT CH 1 (LEFT)'),
                            selected: activeChannel == 0,
                            onSelected: (_) => setState(() => activeChannel = 0),
                          ),
                          SizedBox(width: 15),
                          ChoiceChip(
                            label: Text('🔊 OUTPUT CH 2 (RIGHT)'),
                            selected: activeChannel == 1,
                            onSelected: (_) => setState(() => activeChannel = 1),
                          ),
                        ],
                      ),
                    ),
                    Expanded(
                      child: TabBarView(
                        children: [
                          _buildMatrixView(),
                          _buildGeqView(),
                          _buildPeqView(),
                          _buildCrossoverView(),
                          _buildLimiterView(),
                        ],
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          Widget _buildRtaDisplay() {
            return Container(
              height: 100,
              margin: EdgeInsets.all(12),
              padding: EdgeInsets.all(8),
              decoration: BoxDecoration(color: Colors.black, borderRadius: BorderRadius.circular(8), border: Border.all(color: Colors.grey[800]!)),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Text('REAL-TIME ANALYZER (RTA) - CH ${activeChannel + 1}', style: TextStyle(fontSize: 10, color: Colors.greenAccent, fontWeight: FontWeight.bold)),
                  SizedBox(height: 8),
                  Expanded(
                    child: Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      crossAxisAlignment: CrossAxisAlignment.end,
                      children: List.generate(rtaData.length, (index) {
                        double val = activeChannel == 0 ? rtaData[index] : rtaData[(index + 3) % rtaData.length];
                        return Expanded(
                          child: Container(
                            margin: EdgeInsets.symmetric(horizontal: 2),
                            height: max(3.0, val * 80),
                            decoration: BoxDecoration(
                              color: val > 0.7 ? Colors.redAccent : (val > 0.4 ? Colors.orangeAccent : Colors.greenAccent),
                              borderRadius: BorderRadius.circular(2),
                            ),
                          ),
                        );
                      }),
                    ),
                  )
                ],
              ),
            );
          }

          Widget _buildMatrixView() {
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Text('INPUT MATRIX ROUTING & GAIN MIXER', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold, color: Colors.blueAccent)),
                  SizedBox(height: 20),
                  Table(
                    border: TableBorder.all(color: Colors.grey[700]!),
                    children: [
                      TableRow(children: [
                        Container(padding: EdgeInsets.all(12), color: Colors.black32, child: Text('Input / Output', style: TextStyle(fontWeight: FontWeight.bold))),
                        Container(padding: EdgeInsets.all(12), color: Colors.black32, child: Text('CH 1 (Left)', textAlign: TextAlign.center)),
                        Container(padding: EdgeInsets.all(12), color: Colors.black32, child: Text('CH 2 (Right)', textAlign: TextAlign.center)),
                      ]),
                      _buildMatrixRow(0, "IN 1 (Main L)"),
                      _buildMatrixRow(1, "IN 2 (Main R)"),
                    ],
                  ),
                ],
              ),
            );
          }

          TableRow _buildMatrixRow(int inIdx, String label) {
            return TableRow(children: [
              Padding(padding: const EdgeInsets.all(12.0), child: Text(label, style: TextStyle(fontWeight: FontWeight.bold))),
              _buildMatrixSliderCell(inIdx, 0),
              _buildMatrixSliderCell(inIdx, 1),
            ]);
          }

          Widget _buildMatrixSliderCell(int inIdx, int outIdx) {
            return Column(
              children: [
                Text('${(matrixGains[inIdx][outIdx] * 100).toInt()}%', style: TextStyle(fontSize: 11)),
                Slider(
                  value: matrixGains[inIdx][outIdx],
                  min: 0.0, max: 1.0,
                  onChanged: (val) {
                    setState(() => matrixGains[inIdx][outIdx] = val);
                    DlmsController.setMatrix(inIdx, outIdx, val);
                  },
                ),
              ],
            );
          }

          Widget _buildGeqView() {
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: ListView.builder(
                scrollDirection: Axis.horizontal,
                itemCount: geqFreqs.length,
                itemBuilder: (context, index) {
                  return Column(
                    children: [
                      Text('${geqGains[index].toStringAsFixed(1)} dB', style: TextStyle(fontSize: 11, color: Colors.greenAccent)),
                      Expanded(
                        child: RotatedBox(
                          quarterTurns: 3,
                          child: Slider(
                            value: geqGains[index],
                            min: -12.0, max: 12.0,
                            onChanged: (val) {
                              setState(() => geqGains[index] = val);
                              DlmsController.setGeq(index, val);
                            },
                          ),
                        ),
                      ),
                      Text('${geqFreqs[index]}\nHz', textAlign: TextAlign.center, style: TextStyle(fontSize: 12)),
                    ],
                  );
                },
              ),
            );
          }

          Widget _buildPeqView() {
            return Padding(
              padding: const EdgeInsets.all(24.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Text('Parametric EQ - Band 1', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                  SizedBox(height: 30),
                  Text('Center Frequency: ${peqFreq.toInt()} Hz'),
                  Slider(
                    value: peqFreq, min: 20.0, max: 20000.0,
                    onChanged: (val) {
                      setState(() => peqFreq = val);
                      DlmsController.setPeq(activeChannel, 0, peqFreq, peqGain);
                    },
                  ),
                  SizedBox(height: 20),
                  Text('Gain: ${peqGain.toStringAsFixed(1)} dB'),
                  Slider(
                    value: peqGain, min: -12.0, max: 12.0,
                    onChanged: (val) {
                      setState(() => peqGain = val);
                      DlmsController.setPeq(activeChannel, 0, peqFreq, peqGain);
                    },
                  ),
                ],
              ),
            );
          }

          Widget _buildCrossoverView() {
            return Padding(
              padding: const EdgeInsets.all(24.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.call_split, size: 60, color: Colors.blueAccent),
                  SizedBox(height: 20),
                  Text('Linkwitz-Riley Sub/Mid Crossover', style: TextStyle(fontSize: 18)),
                  SizedBox(height: 20),
                  Text('Cutoff Point: ${xOverFreq.toInt()} Hz', style: TextStyle(fontSize: 22, color: Colors.blueAccent)),
                  Slider(
                    value: xOverFreq, min: 40.0, max: 250.0,
                    onChanged: (val) {
                      setState(() => xOverFreq = val);
                      DlmsController.setCrossover(activeChannel, 0, xOverFreq);
                    },
                  ),
                ],
              ),
            );
          }

          Widget _buildLimiterView() {
            return Padding(
              padding: const EdgeInsets.all(24.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.gpp_good, size: 60, color: Colors.redAccent),
                  SizedBox(height: 20),
                  Text('Brickwall Speaker Protection', style: TextStyle(fontSize: 18)),
                  SizedBox(height: 30),
                  Text('Threshold Ceiling: ${limiterThresh.toStringAsFixed(1)} dB', style: TextStyle(fontSize: 22, color: Colors.redAccent)),
                  Slider(
                    value: limiterThresh, min: -20.0, max: 0.0,
                    onChanged: (val) {
                      setState(() => limiterThresh = val);
                      DlmsController.setLimiter(activeChannel, true, limiterThresh);
                    },
                  ),
                ],
              ),
            );
          }
        }
        EOF

    # 5. Suntik File MainActivity Berisi Kontrol Audio DSP Dan Engine Capture RTA Stream
    - name: Suntik Kode Native Engine Audio Android
      run: |
        cd $HOME/dlms_virtual
        
        cat << 'EOF' > android/app/src/main/kotlin/com/example/dlms_virtual/MainActivity.kt
        package com.example.dlms_virtual

        import android.media.audiofx.Equalizer
        import android.media.audiofx.DynamicsProcessing
        import android.media.audiofx.Visualizer
        import android.os.Handler
        import android.os.Looper
        import io.flutter.embedding.android.FlutterActivity
        import io.flutter.embedding.engine.FlutterEngine
        import io.flutter.plugin.common.MethodChannel
        import io.flutter.plugin.common.EventChannel
        import kotlin.math.hypot

        class MainActivity: FlutterActivity() {
            private val CHANNEL = "com.example.dlms/audiofx"
            private val EVENT_CHANNEL = "com.example.dlms/rta_stream"
            private var equalizer: Equalizer? = null
            private var dspEngine: DynamicsProcessing? = null
            private var visualizer: Visualizer? = null
            private var eventSink: EventChannel.EventSink? = null
            private val handler = Handler(Looper.getMainLooper())

            override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                super.configureFlutterEngine(flutterEngine)

                try {
                    equalizer = Equalizer(0, 0).apply { enabled = true }
                    val dspConfig = DynamicsProcessing.Config.Builder(
                        DynamicsProcessing.VARIANT_FAVOR_FREQUENCY_RESOLUTION,
                        2, true, 5, true, 3, false, 0, true
                    ).build()
                    dspEngine = DynamicsProcessing(0, dspConfig).apply { enabled = true }
                    
                    // Inisialisasi Android Visualizer Engine untuk pembacaan RTA
                    visualizer = Visualizer(0).apply {
                        captureSize = Visualizer.getCaptureSizeRange()[1]
                        enabled = true
                    }
                } catch (e: Exception) { e.printStackTrace() }

                EventChannel(flutterEngine.dartExecutor.binaryMessenger, EVENT_CHANNEL).setStreamHandler(
                    object : EventChannel.StreamHandler {
                        override fun onListen(arguments: Any?, events: EventChannel.EventSink?) {
                            eventSink = events
                            startRtaStreaming()
                        }
                        override fun onCancel(arguments: Any?) { eventSink = null }
                    }
                )

                MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                    when (call.method) {
                        "setMatrix" -> {
                            val input = call.argument<Int>("input") ?: 0
                            val output = call.argument<Int>("output") ?: 0
                            val gain = call.argument<Double>("gain")?.toFloat() ?: 1f
                            try {
                                dspEngine?.let {
                                    val inputGain = it.getInputGainByChannelIndex(output)
                                    it.setInputGainByChannelIndex(output, gain * 10f)
                                }
                                result.success(null)
                            } catch (e: Exception) { result.error("ERROR", e.message, null) }
                        }
                        "setGeq" -> {
                            val band = call.argument<Int>("band") ?: 0
                            val gain = call.argument<Double>("gain")?.toFloat() ?: 0f
                            try {
                                equalizer?.setBandLevel(band.toShort(), (gain * 100).toInt().toShort())
                                result.success(null)
                            } catch (e: Exception) { result.error("ERROR", e.message, null) }
                        }
                        "setPeq" -> {
                            val ch = call.argument<Int>("channel") ?: 0
                            val band = call.argument<Int>("band") ?: 0
                            val freq = call.argument<Double>("freq")?.toFloat() ?: 1000f
                            val gain = call.argument<Double>("gain")?.toFloat() ?: 0f
                            try {
                                dspEngine?.let {
                                    val eqBand = it.getPreEqBand(ch, band).apply { frequency = freq; this.gain = gain }
                                    it.setPreEqBand(ch, band, eqBand)
                                }
                                result.success(null)
                            } catch (e: Exception) { result.error("ERROR", e.message, null) }
                        }
                        "setCrossover" -> {
                            val ch = call.argument<Int>("channel") ?: 0
                            val band = call.argument<Int>("band") ?: 0
                            val cutoff = call.argument<Double>("cutoff")?.toFloat() ?: 120f
                            try {
                                dspEngine?.let {
                                    val mbc = it.getMbcBand(ch, band).apply { cutoffFrequency = cutoff }
                                    it.setMbcBand(ch, band, mbc)
                                }
                                result.success(null)
                            } catch (e: Exception) { result.error("ERROR", e.message, null) }
                        }
                        "setLimiter" -> {
                            val ch = call.argument<Int>("channel") ?: 0
                            val enabled = call.argument<Boolean>("enabled") ?: true
                            val thresh = call.argument<Double>("thresh")?.toFloat() ?: 0f
                            try {
                                dspEngine?.let {
                                    val lim = DynamicsProcessing.Limiter(enabled, enabled, ch).apply { threshold = thresh }
                                    it.setLimiterConfigByChannelIndex(ch, lim)
                                }
                                result.success(null)
                            } catch (e: Exception) { result.error("ERROR", e.message, null) }
                        }
                        else -> result.notImplemented()
                    }
                }
            }

            private fun startRtaStreaming() {
                handler.post(object : Runnable {
                    override fun run() {
                        if (eventSink == null) return
                        val fft = ByteArray(1024)
                        visualizer?.getFft(fft)
                        
                        // Menghitung besaran magnitudo FFT untuk diubah ke bar grafik RTA
                        val magnitudes = ArrayList<Double>()
                        for (i in 0 until 16) {
                            val r = fft[i * 2].toDouble()
                            val j = fft[i * 2 + 1].toDouble()
                            val mag = hypot(r, j) / 128.0
                            magnitudes.add(if (mag > 1.0) 1.0 else mag)
                        }
                        eventSink?.success(magnitudes)
                        handler.postDelayed(this, 100) // Update RTA setiap 100ms
                    }
                })
            }
        }
        EOF

    # 6. Suntik Hak Akses Audio Sistem dan Perekaman Mikrofon (Wajib untuk RTA) ke Manifest Asli
    - name: Suntik Izin Audio dan Record ke Manifest
      run: |
        cd $HOME/dlms_virtual/android/app/src/main
        sed -i '/<application/i \    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' AndroidManifest.xml

    # 7. Proses Perakitan
    - name: Proses Merakit APK (Release Mode)
      run: |
        cd $HOME/dlms_virtual
        flutter pub get
        flutter build apk --release --no-tree-shake-icons

    # 8. Unggah Hasil APK
    - name: Upload File APK yang Sudah Jadi
      uses: actions/upload-artifact@v4
      with:
        name: dlms-virtual-apk
        path: /home/runner/dlms_virtual/build/app/outputs/flutter-apk/app-release.apk
