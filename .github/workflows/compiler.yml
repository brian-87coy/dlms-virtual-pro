name: Build DLMS APK Stable V2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Gunakan Java modern
    - name: Install Java (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 2. Ambil Flutter stable versi paling baru
    - name: Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 3. Buat folder baru murni dari Flutter SDK (100% Bebas Error V1)
    - name: Generate Fresh Flutter Project V2
      run: |
        cd $HOME
        flutter create --template=app --platforms=android --org com.example dlms_virtual

    # 4. Suntik Kode UI dan Konfigurasi Pubspec langsung
    - name: Suntik Kode UI dan Dependensi Audio
      run: |
        cd $HOME/dlms_virtual
        
        # Tambahkan dependensi equalizer/audio yang murni berjalan di sisi Flutter
        flutter pub add equalizers

        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';

        void main() => runApp(MaterialApp(home: DlmsHomeScreen(), theme: ThemeData.dark(), debugShowCheckedModeBanner: false));

        class DlmsHomeScreen extends StatefulWidget {
          @override
          _DlmsHomeScreenState createState() => _DlmsHomeScreenState();
        }

        class _DlmsHomeScreenState extends State<DlmsHomeScreen> {
          int activeChannel = 0; 
          List<double> geqGains = List.filled(10, 0.0);
          List<int> geqFreqs = [31, 62, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

          double peqFreq = 1000.0;
          double peqGain = 0.0;
          double xOverFreq = 120.0;
          double limiterThresh = -1.0;

          @override
          Widget build(BuildContext context) {
            return DefaultTabController(
              length: 4,
              child: Scaffold(
                appBar: AppBar(
                  title: Text('🔴 DLMS VIRTUAL PRO'),
                  bottom: TabBar(
                    isScrollable: true,
                    tabs: [
                      Tab(icon: Icon(Icons.equalizer), text: "Master GEQ"),
                      Tab(icon: Icon(Icons.tune), text: "Parametric EQ"),
                      Tab(icon: Icon(Icons.call_split), text: "Crossover"),
                      Tab(icon: Icon(Icons.gpp_good), text: "Output Limiter"),
                    ],
                  ),
                ),
                body: Column(
                  children: [
                    Container(
                      color: Colors.black26,
                      padding: EdgeInsets.symmetric(vertical: 10),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          ChoiceChip(
                            label: Text('🔊 LEFT CHANNEL'),
                            selected: activeChannel == 0,
                            onSelected: (_) => setState(() => activeChannel = 0),
                          ),
                          SizedBox(width: 15),
                          ChoiceChip(
                            label: Text('🔊 RIGHT CHANNEL'),
                            selected: activeChannel == 1,
                            onSelected: (_) => setState(() => activeChannel = 1),
                          ),
                        ],
                      ),
                    ),
                    Expanded(
                      child: TabBarView(
                        children: [
                          _buildGeqView(),
                          _buildPeqView(),
                          _buildCrossoverView(),
                          _buildLimiterView(),
                        ],
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          Widget _buildGeqView() {
            return Padding(
              padding: const EdgeInsets.all(16.0),
              child: ListView.builder(
                scrollDirection: Axis.horizontal,
                itemCount: geqFreqs.length,
                itemBuilder: (context, index) {
                  return Column(
                    children: [
                      Text('${geqGains[index].toStringAsFixed(1)} dB', style: TextStyle(fontSize: 11, color: Colors.greenAccent)),
                      Expanded(
                        child: RotatedBox(
                          quarterTurns: 3,
                          child: Slider(
                            value: geqGains[index],
                            min: -12.0, max: 12.0,
                            onChanged: (val) {
                              setState(() => geqGains[index] = val);
                            },
                          ),
                        ),
                      ),
                      Text('${geqFreqs[index]}\nHz', textAlign: TextAlign.center, style: TextStyle(fontSize: 12)),
                    ],
                  );
                },
              ),
            );
          }

          Widget _buildPeqView() {
            return Padding(
              padding: const EdgeInsets.all(24.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Text('Parametric EQ - Band 1', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                  SizedBox(height: 30),
                  Text('Center Frequency: ${peqFreq.toInt()} Hz'),
                  Slider(
                    value: peqFreq, min: 20.0, max: 20000.0,
                    onChanged: (val) {
                      setState(() => peqFreq = val);
                    },
                  ),
                  SizedBox(height: 20),
                  Text('Gain: ${peqGain.toStringAsFixed(1)} dB'),
                  Slider(
                    value: peqGain, min: -12.0, max: 12.0,
                    onChanged: (val) {
                      setState(() => peqGain = val);
                    },
                  ),
                ],
              ),
            );
          }

          Widget _buildCrossoverView() {
            return Padding(
              padding: const EdgeInsets.all(24.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.call_split, size: 60, color: Colors.blueAccent),
                  SizedBox(height: 20),
                  Text('Linkwitz-Riley Sub/Mid Crossover', style: TextStyle(fontSize: 18)),
                  SizedBox(height: 20),
                  Text('Cutoff Point: ${xOverFreq.toInt()} Hz', style: TextStyle(fontSize: 22, color: Colors.blueAccent)),
                  Slider(
                    value: xOverFreq, min: 40.0, max: 250.0,
                    onChanged: (val) {
                      setState(() => xOverFreq = val);
                    },
                  ),
                ],
              ),
            );
          }

          Widget _buildLimiterView() {
            return Padding(
              padding: const EdgeInsets.all(24.0),
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.gpp_good, size: 60, color: Colors.redAccent),
                  SizedBox(height: 20),
                  Text('Brickwall Speaker Protection', style: TextStyle(fontSize: 18)),
                  SizedBox(height: 30),
                  Text('Threshold Ceiling: ${limiterThresh.toStringAsFixed(1)} dB', style: TextStyle(fontSize: 22, color: Colors.redAccent)),
                  Slider(
                    value: limiterThresh, min: -20.0, max: 0.0,
                    onChanged: (val) {
                      setState(() => limiterThresh = val);
                    },
                  ),
                ],
              ),
            );
          }
        }
        EOF

    # 5. Jalankan perakitan murni tanpa utak-atik folder Android native
    - name: Proses Merakit APK (Release Mode)
      run: |
        cd $HOME/dlms_virtual
        flutter pub get
        flutter build apk --release --no-tree-shake-icons

    # 6. Ambil file APK hasil jadi keluar
    - name: Upload File APK yang Sudah Jadi
      uses: actions/upload-artifact@v4
      with:
        name: dlms-virtual-apk
        path: /home/runner/dlms_virtual/build/app/outputs/flutter-apk/app-release.apk
